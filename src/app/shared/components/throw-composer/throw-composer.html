<section class="composer">
  <h3>Throw Composer</h3>

  <div class="rows">
    <div class="row" *ngFor="let dieType of dieTypes; trackBy: trackByDieType">
      <div class="die-label">{{ dieType }}</div>

      <div class="controls">
        <button type="button" (click)="decrease(dieType)" aria-label="Decrease {{ dieType }} count">
          -
        </button>

        <input
          type="number"
          min="0"
          step="1"
          [value]="normalizedConfig[dieType]"
          (input)="onCountChange(dieType, $any($event.target).value)"
          aria-label="{{ dieType }} count"
        />

        <button type="button" (click)="increase(dieType)" aria-label="Increase {{ dieType }} count">
          +
        </button>
      </div>
    </div>
  </div>

  <p class="error" *ngIf="configErrors.length > 0">{{ configErrors[0] }}</p>
</section>
