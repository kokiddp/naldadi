<section class="percentile-bands" *ngIf="buckets.length > 0">
  <h3>{{ t('analysis.probabilityBuckets.title') }}</h3>
  <p>{{ t('analysis.probabilityBuckets.subtitle') }}</p>

  <div class="bucket-grid">
    <article class="bucket-card" *ngFor="let bucket of buckets; trackBy: trackByBucket">
      <h4>{{ formatProbabilityBucketLabel(bucket) }}</h4>
      <ul>
        <li *ngFor="let point of bucket.points; trackBy: trackByTotal">
          {{ t('analysis.probabilityBuckets.entry', { total: point.total, probability: formatPercent(point.probability) }) }}
        </li>
      </ul>
    </article>
  </div>
</section>
