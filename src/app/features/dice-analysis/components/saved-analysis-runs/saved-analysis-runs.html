@if (items.length > 0) {
  <section class="saved-runs">
    <div class="saved-runs-header">
      <h3>{{ t('analysis.saved.title') }}</h3>
      <button type="button" class="saved-runs-clear-btn" (click)="onClear()" [disabled]="disabled">
        {{ t('analysis.saved.clear') }}
      </button>
    </div>

    <ul>
      @for (item of items; track trackBySavedRun($index, item)) {
        <li
          [class.is-active]="item.id === activeItemId"
          [attr.aria-current]="item.id === activeItemId ? 'true' : null"
        >
          <div class="saved-runs-meta">
            <strong>{{ item.title }}</strong>
            <span>{{ item.summary }}</span>
          </div>
          <div class="saved-runs-actions">
            <button type="button" class="saved-runs-load-btn" (click)="onLoad(item.id)" [disabled]="disabled">
              {{ t('analysis.saved.load') }}
            </button>
            <button type="button" class="saved-runs-delete-btn" (click)="onDelete(item.id)" [disabled]="disabled">
              {{ t('analysis.saved.delete') }}
            </button>
          </div>
        </li>
      }
    </ul>

    @if (totalPages > 1) {
      <app-pagination-controls
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        [previousDisabled]="disabled || currentPage <= 1"
        [nextDisabled]="disabled || currentPage >= totalPages"
        (previous)="onPreviousPage()"
        (next)="onNextPage()"
      />
    }
  </section>
}
